name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check aether_context tests
      - name: Types (mypy)
        run: python -m mypy aether_context
      - name: Tests
        run: python -m pytest -q --cov=aether_context --cov-report=term-missing
      - name: Bench smoke (hermetic mock model)
        run: python bench/drift_vs_window.py --model mock --quick

  numpy-matrix:
    name: numpy ${{ matrix.numpy }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        numpy: ["1.24.*", "1.26.*", "2.*"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]" "numpy==${{ matrix.numpy }}"
      - run: python -m pytest -q
